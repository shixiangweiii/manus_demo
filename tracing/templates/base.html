<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trace Viewer{% endblock %} - Manus Demo</title>
    <style>
        /* ============================================================
         * Dark theme CSS (DevTools-inspired)
         * ============================================================ */
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #2b2b3d;
            --bg-hover: #363650;
            --bg-card: #252538;
            --text-primary: #e0e0f0;
            --text-secondary: #a0a0c0;
            --text-muted: #707090;
            --accent: #7c8fff;
            --accent-hover: #9aa8ff;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --border: #3a3a52;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
        }

        .header-logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .header-nav {
            display: flex;
            gap: 16px;
            margin-left: 32px;
        }

        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .header-nav a:hover,
        .header-nav a.active {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* Main content */
        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Table */
        .table-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        /* Links */
        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
        }

        /* Status badges */
        .status-ok {
            color: var(--success);
            font-weight: 500;
        }

        .status-error {
            color: var(--error);
            font-weight: 500;
        }

        /* Duration */
        .duration {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Mono text */
        .mono {
            font-family: var(--font-mono);
            font-size: 13px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 64px 32px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Utility */
        .text-muted {
            color: var(--text-muted);
        }

        .text-sm {
            font-size: 13px;
        }

        /* Breadcrumb */
        .breadcrumb {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .breadcrumb a {
            color: var(--text-secondary);
        }

        .breadcrumb span {
            margin: 0 8px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <a href="/traces" class="header-logo">🔍 Trace Viewer</a>
        <nav class="header-nav">
            <a href="/traces" class="{% block nav_traces %}{% endblock %}">Traces</a>
        </nav>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
